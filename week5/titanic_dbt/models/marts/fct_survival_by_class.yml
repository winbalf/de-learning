version: 2

models:
  - name: fct_survival_by_class
    description: "Survival statistics aggregated by passenger class"
    columns:
      - name: passenger_class
        description: "1, 2 or 3"
        data_tests:
          - unique
          - not_null

      - name: survival_rate_pct
        description: "Survival rate 0-100"
        data_tests:
          - not_null

      - name: total_passengers
        description: "Must be positive"
        data_tests:
          - not_null
